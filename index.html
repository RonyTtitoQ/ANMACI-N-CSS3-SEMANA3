<html>
    <head>
        <title> ANIMACIÓN3-CSS </title>
        <style>
            *{
                padding: 0px;
                margin: 0px;
            }
            .contenedor{
                width: 400px;
                height: 200px;
                border: 1px solid black;
                position: relative;  /* Para centar el div */
                margin: 0 auto; /* para centara el div */

                overflow: hidden; /* muestra solo lo interior */
            }

            .cuadrito{
                width: 100px;
                height: 100px;
                background-color: black;
                position: absolute; /* permite mover el div del contenedor */
                
                top: 50px; /* Distancia de arriba para abajo */
                left: 500px; /* Moverse a la izquierda */

                animation: cuadrito 3s infinite ease-in-out;

            }

            @keyframes cuadrito{
                /* Inicio */
                from{
                    left: 500px;
                }
                /* Final */
                to{
                    left: -100px;
                }

            }

        </style>
       
    </head>
    <body>
        <h1>ANIMACION CSS3 -MOVIMIENTO</h1>
        <a href="animacion1.html">Movimiento Horizontal</a><br><br>
        <a href="animacion2.html">Movimiento Vertical</a><br><br>
        <a href="animacion3.html">Movimiento Diagonal</a><br><br>
        <a href="coete.html">Movimiento de Coete</a>
    </body>
</html>
